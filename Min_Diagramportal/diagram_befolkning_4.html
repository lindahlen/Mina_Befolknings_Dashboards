<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysdiagram Befolkning</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            /* ========================================== */
            /* ÄNDRA MAXIMAL BREDD PÅ RULLISTAN HÄR NERE  */
            /* ========================================== */
            --max-bredd-rullista: 250px; 
        }

        body { font-family: Arial, sans-serif; margin: 0; padding: 10px 15px; display: flex; flex-direction: column; align-items: center; background-color: white; height: 100vh; box-sizing: border-box; overflow: hidden; }
        .top-rad { display: flex; flex-wrap: nowrap; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 8px; gap: 10px; height: 40px; overflow: hidden; flex-shrink: 0; }
        .kontroller-vanster { display: flex; gap: 10px; align-items: center; flex-wrap: nowrap; flex: 0 1 auto; min-width: 0; }
        
        select#indikator { padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc; background-color: #f8f9fa; cursor: pointer; font-weight: bold; max-width: var(--max-bredd-rullista); text-overflow: ellipsis; white-space: nowrap; overflow: hidden; flex-shrink: 1; }
        .toggle-btn { padding: 7px 12px; border-radius: 6px; border: 1px solid #ccc; background-color: #f8f9fa; cursor: pointer; font-weight: bold; color: #495057; display: flex; align-items: center; transition: all 0.2s; user-select: none; font-size: 0.9rem; white-space: nowrap; flex-shrink: 0; }
        .toggle-btn input[type="checkbox"] { margin-right: 6px; cursor: pointer; transform: scale(1.1); }
        .toggle-btn.active { background-color: #495057; color: white; border-color: #343a40; }
        
        .trend-ruta { padding: 6px 12px; border-radius: 6px; background-color: #f4f7f6; border: 1px solid #ddd; font-size: 13px; font-weight: bold; display: none; align-items: center; white-space: nowrap; flex-shrink: 0; margin-left: auto; }
        
        .trend-bra { color: #009E73; display: flex; align-items: center; }    
        .trend-dalig { color: #D55E00; display: flex; align-items: center; }  
        .trend-neutral { color: #6c757d; display: flex; align-items: center; } 
        
        .pil-boll { display: inline-flex; justify-content: center; align-items: center; width: 24px; height: 24px; border-radius: 50%; color: white; font-size: 16px; font-weight: 900; -webkit-text-stroke: 1px white; margin-right: 8px; flex-shrink: 0;}
        .trend-bra .pil-boll { background-color: #009E73; }    
        .trend-dalig .pil-boll { background-color: #D55E00; }  
        .trend-neutral .pil-boll { background-color: #6c757d; } 
        
        .canvas-container { width: 100%; flex-grow: 1; min-height: 0; position: relative; } 
        #main-view { transition: opacity 0.3s ease; }
        #drilldown-view { transition: opacity 0.3s ease; display: none; background: #f8fbff; border-radius: 8px; border: 1px solid #e0ecf8; padding: 10px 15px 15px 15px; box-sizing: border-box;}
        #felmeddelande { color: #dc3545; font-weight: bold; text-align: center; margin-bottom: 8px; font-size: 14px; flex-shrink: 0; }
        .botten-rad { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-top: 5px; flex-shrink: 0; min-height: 18px;}
        .botten-info { font-size: 12px; color: #6c757d; font-style: italic; }
        .tillbaka-btn { background-color: #5a2e8c; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .tillbaka-btn:hover { background-color: #3b1d5e; }
    </style>
</head>
<body>
    <div id="felmeddelande"></div>
    <div class="top-rad" id="topp-kontroller">
        <div class="kontroller-vanster">
            <select id="indikator" onchange="uppdateraDiagram()"></select>
            <label class="toggle-btn" id="compareLabel" title="Visa jämförelse med Riket">
                <input type="checkbox" id="compareRegion" onchange="toggleCompareRegion()">
                Jämför med Riket
            </label>
            <label class="toggle-btn" id="momLabel" title="Visa förändring jämfört med föregående månad">
                <input type="checkbox" id="showMoM" onchange="toggleMoM()">
                Månadsförändring
            </label>
        </div>
        <div id="trend-ruta" class="trend-ruta"><span id="avvikelse-text">Laddar...</span></div>
    </div>
    
    <div class="canvas-container" id="main-view" style="display: block;">
        <canvas id="mittDiagram"></canvas>
    </div>

    <div class="canvas-container" id="drilldown-view">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-shrink: 0; width: 100%; gap: 10px;">
            <h3 id="drilldown-titel" style="margin: 0; color: #5a2e8c; font-size: 16px; flex-grow: 1; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">Laddar komponenter...</h3>
            
            <select id="drilldown-tid-select" onchange="bytaDrilldownTid()" style="padding: 5px 10px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold; color: #333; display: none; cursor: pointer; max-width: 120px;"></select>
            
            <button class="tillbaka-btn" onclick="stangDrilldown()" style="white-space: nowrap;">🔙 Tillbaka</button>
        </div>
        <div style="flex-grow: 1; min-height: 0; position: relative; width: 100%;">
            <canvas id="drilldownDiagram"></canvas>
        </div>
    </div>
    
    <div class="botten-rad" id="botten-rad">
        <div id="botten-info" class="botten-info"></div>
    </div>

    <script>
        // ==========================================
        const DIAGRAM_NUMMER = "4"; 
        // ==========================================

        const csvFilnamn = "befolkning_data.csv"; 
        const jsonFilnamn = "befolkning_config.json";

        const FARG_BRA = '#009E73'; const FARG_DALIG = '#D55E00';          
        const FARG_NEUTRAL_PUNKT = '#CED4DA'; const FARG_NEUTRAL_TEXT_STAPEL = '#6c757d'; 
        const FARG_RIKET = '#495057';

        const HUVUD_FARGER = { "1": "#5a2e8c", "2": "#009E73", "3": "#E69F00", "4": "#6f42c1" };
        const FARG_LINJE = HUVUD_FARGER[DIAGRAM_NUMMER] || '#5a2e8c'; 
        const FARG_PUNKTER = FARG_LINJE; 
        const FARG_STAPEL = 'rgba(90, 46, 140, 0.6)'; const FARG_STAPEL_KANT = 'rgba(90, 46, 140, 1)';   

        const DRILLDOWN_FARGER = { "grön": '#009E73', "röd": '#D55E00', "blå": 'rgba(54, 162, 235, 0.7)', "gul": 'rgba(255, 206, 86, 0.7)', "lila": 'rgba(153, 102, 255, 0.7)', "grå": '#6c757d', "orange": 'rgba(255, 159, 64, 0.7)', "rosa": 'rgba(255, 99, 132, 0.7)' };

        let globalBerakning = "_R12"; let globalGrafTyp = "linje"; let globalManad = "1"; let globalAr = new Date().getFullYear();
        let selectedCompareRegion = "none"; let globalTid = "5"; 
        let globalVisningsTyp = "absolut"; 
        let globalVisaPrognos = false; 
        let showMoM = false; 
        
        let csvData = []; let myChart = null; let drillChart = null;
        let sparadeRaderForDrilldown = []; let globalAllaRader = []; let configDataGlobal = null; 
        
        let aktuellDrilldownIndikator = "";
        let aktuellDrilldownKomponentEtikett = "";
        let aktuellaDrilldownEtiketter = [];

        function beraknaYoY(vardenArr, arArr, manadArr, rawCsvData, kolNamn) {
            let res = [];
            for(let i = 0; i < vardenArr.length; i++) {
                let vNu = vardenArr[i];
                if (vNu === null) { res.push(null); continue; }
                let tAr = arArr[i] - 1; let tMan = manadArr[i];
                
                let vDa = null;
                if (rawCsvData && kolNamn) {
                    let daRad = rawCsvData.find(function(r) { 
                        let rAr = parseInt(r["År"] !== undefined ? r["År"] : r["Ã…r"]);
                        let rMan = parseInt(r["Månad"] !== undefined ? r["Månad"] : r["MÃ¥nad"]);
                        return rAr === tAr && rMan === tMan; 
                    });
                    if (daRad) {
                        vDa = tvattaSiffra(daRad[kolNamn]);
                        if (vDa === null) {
                            let fallback = kolNamn.replace("_Manad", "").replace("_R12", "");
                            vDa = tvattaSiffra(daRad[fallback]);
                        }
                    }
                } else {
                    let daIndex = -1;
                    for (let j = i - 1; j >= 0; j--) {
                        if (arArr[j] === tAr && manadArr[j] === tMan) { daIndex = j; break; }
                    }
                    vDa = daIndex !== -1 ? vardenArr[daIndex] : null;
                }
                
                if (vDa !== null && vDa !== 0) {
                    res.push(((vNu - vDa) / Math.abs(vDa)) * 100);
                } else { res.push(null); }
            }
            return res;
        }

        function beraknaMoMDiff(vardenArr, arArr, manadArr, rawCsvData, kolNamn) {
            let res = [];
            for(let i = 0; i < vardenArr.length; i++) {
                let vNu = vardenArr[i];
                if (vNu === null) { res.push(null); continue; }
                let tAr = manadArr[i] === 1 ? arArr[i] - 1 : arArr[i];
                let tMan = manadArr[i] === 1 ? 12 : manadArr[i] - 1;
                
                let vDa = null;
                if (rawCsvData && kolNamn) {
                    let daRad = rawCsvData.find(function(r) { 
                        let rAr = parseInt(r["År"] !== undefined ? r["År"] : r["Ã…r"]);
                        let rMan = parseInt(r["Månad"] !== undefined ? r["Månad"] : r["MÃ¥nad"]);
                        return rAr === tAr && rMan === tMan; 
                    });
                    if (daRad) {
                        vDa = tvattaSiffra(daRad[kolNamn]);
                        if (vDa === null) {
                            let fallback = kolNamn.replace("_Manad", "").replace("_R12", "");
                            vDa = tvattaSiffra(daRad[fallback]);
                        }
                    }
                } else {
                    let daIndex = -1;
                    for (let j = i - 1; j >= 0; j--) {
                        if (arArr[j] === tAr && manadArr[j] === tMan) { daIndex = j; break; }
                    }
                    vDa = daIndex !== -1 ? vardenArr[daIndex] : null;
                }

                if (vDa !== null) {
                    res.push(vNu - vDa);
                } else { res.push(null); }
            }
            return res;
        }

        const cb = "?t=" + new Date().getTime();

        Promise.all([
            fetch(csvFilnamn + cb).then(function(r) { if(!r.ok) throw new Error("CSV saknas"); return r.arrayBuffer(); }),
            fetch(jsonFilnamn + cb).then(function(r) { if(!r.ok) throw new Error("JSON saknas"); return r.json(); }).catch(function(e) { return null; })
        ]).then(function(data) {
            let csvBuffer = data[0];
            let configData = data[1];

            configDataGlobal = configData;
            const selectEl = document.getElementById("indikator");
            
            if (configData) {
                if (configData[DIAGRAM_NUMMER] && configData[DIAGRAM_NUMMER].length > 0) {
                    configData[DIAGRAM_NUMMER].forEach(function(ind) {
                        let opt = document.createElement("option"); 
                        opt.value = ind.id; 
                        opt.textContent = ind.label || ind.id.replace(/_/g, ' '); 
                        selectEl.appendChild(opt);
                    });
                } else {
                    selectEl.innerHTML = `<option value="">(Inga kryss i Visas_i_Diagram_${DIAGRAM_NUMMER})</option>`;
                    document.getElementById("avvikelse-text").innerHTML = "<span class='trend-neutral'>Välj en indikator</span>";
                    document.getElementById("trend-ruta").style.display = "block";
                }
            } else {
                selectEl.innerHTML = '<option value="">(Kunde inte ladda konfigurationen)</option>';
            }

            let decoder = new TextDecoder("utf-8"); let text = decoder.decode(csvBuffer);
            if (text.includes("\uFFFD") || text.includes("Ã")) { decoder = new TextDecoder("windows-1252"); text = decoder.decode(csvBuffer); }
            text = text.trim().replace(/^\uFEFF/i, '');
            Papa.parse(text, { header: true, skipEmptyLines: true, delimiter: ";", transformHeader: function(h) { return h.trim(); },
                complete: function(res) { 
                    csvData = res.data; 
                    if (csvData.length === 0) {
                        document.getElementById("felmeddelande").innerText = "Filen är tom.";
                    } else {
                        uppdateraDiagram(); 
                    }
                }
            });
        }).catch(function(e) { document.getElementById("felmeddelande").innerText = "Kunde inte ladda data: " + e.message; });

        window.uppdateraFranMaster = function(berakning, grafTyp, manad, tid, visningsTyp, visaPrognos, ar) { 
            let drilldownActive = document.getElementById("drilldown-view").style.display === "flex" || document.getElementById("drilldown-view").style.display === "block";
            let changedGrafTyp = (globalGrafTyp !== grafTyp);

            globalBerakning = berakning; globalGrafTyp = grafTyp; globalManad = manad; 
            if(ar) globalAr = ar;
            if(tid) globalTid = tid; 
            if(visningsTyp !== undefined) {
                 if (visningsTyp === true) globalVisningsTyp = "index";
                 else if (visningsTyp === false) globalVisningsTyp = "absolut";
                 else globalVisningsTyp = visningsTyp;
            }
            if(visaPrognos !== undefined) globalVisaPrognos = visaPrognos;
            
            uppdateraDiagram(); 
            
            if (drilldownActive) {
                if (changedGrafTyp) {
                    stangDrilldown(); 
                } else {
                    let selectVal = document.getElementById("drilldown-tid-select").value;
                    let index = parseInt(selectVal);
                    if (globalGrafTyp === 'stapel') {
                        visaDrilldown(0, aktuellDrilldownKomponentEtikett, aktuellDrilldownIndikator, true);
                    } else if (!isNaN(index) && sparadeRaderForDrilldown[index]) {
                        visaDrilldown(index, aktuellaDrilldownEtiketter[index], aktuellDrilldownIndikator, false);
                    } else {
                        stangDrilldown();
                    }
                }
            }
        };
        
        window.toggleCompareRegion = function() { 
            let checkbox = document.getElementById("compareRegion"); let label = document.getElementById("compareLabel");
            selectedCompareRegion = checkbox.checked ? "Riket" : "none"; 
            if (checkbox.checked) { label.classList.add("active"); } else { label.classList.remove("active"); }
            
            uppdateraDiagram(); 
            
            let drilldownActive = document.getElementById("drilldown-view").style.display === "flex" || document.getElementById("drilldown-view").style.display === "block";
            if (drilldownActive) {
                let selectVal = document.getElementById("drilldown-tid-select").value;
                let index = parseInt(selectVal);
                if (globalGrafTyp === 'stapel') {
                    visaDrilldown(0, aktuellDrilldownKomponentEtikett, aktuellDrilldownIndikator, true);
                } else if (!isNaN(index) && sparadeRaderForDrilldown[index]) {
                    visaDrilldown(index, aktuellaDrilldownEtiketter[index], aktuellDrilldownIndikator, false);
                }
            }
        };

        window.toggleMoM = function() { 
            let checkbox = document.getElementById("showMoM"); 
            let label = document.getElementById("momLabel");
            showMoM = checkbox.checked; 
            if (checkbox.checked) { label.classList.add("active"); } else { label.classList.remove("active"); }
            
            uppdateraDiagram(); 
            
            let drilldownActive = document.getElementById("drilldown-view").style.display === "flex" || document.getElementById("drilldown-view").style.display === "block";
            if (drilldownActive) {
                let selectVal = document.getElementById("drilldown-tid-select").value;
                let index = parseInt(selectVal);
                if (globalGrafTyp === 'stapel') {
                    visaDrilldown(0, aktuellDrilldownKomponentEtikett, aktuellDrilldownIndikator, true);
                } else if (!isNaN(index) && sparadeRaderForDrilldown[index]) {
                    visaDrilldown(index, aktuellaDrilldownEtiketter[index], aktuellDrilldownIndikator, false);
                }
            }
        };

        function tvattaSiffra(val) { 
            if (val === undefined || val === null) return null; 
            let str = val.toString().trim(); 
            if (str === ".." || str === "" || str === "-") return null; 
            let siffra = parseFloat(str.replace(',', '.').replace(/\s/g, '')); 
            return isNaN(siffra) ? null : siffra; 
        }

        function beraknaTroskel(troskelRaw, jamforelseVarde) { 
            if (!troskelRaw) return 0; 
            let rawStr = troskelRaw.toString().trim(); 
            if (rawStr.includes("%")) return (isNaN(parseFloat(rawStr.replace("%", "").replace(",", "."))) ? 0 : Math.abs(jamforelseVarde * (parseFloat(rawStr.replace("%", "").replace(",", ".")) / 100))); 
            return isNaN(parseFloat(rawStr.replace(",", "."))) ? 0 : parseFloat(rawStr.replace(",", ".")); 
        }

        window.stangDrilldown = function() {
            document.getElementById("drilldown-view").style.display = "none";
            document.getElementById("main-view").style.display = "block";
            document.getElementById("topp-kontroller").style.display = "flex";
            document.getElementById("botten-rad").style.display = "flex";
        };

        function getDrilldownConfig(valdIndikator) {
            if (!configDataGlobal || !configDataGlobal[DIAGRAM_NUMMER]) return null;
            let conf = configDataGlobal[DIAGRAM_NUMMER].find(function(i) { return i.id === valdIndikator; });
            if (conf && conf.drilldown_komponenter && conf.drilldown_komponenter.length > 0) return conf;
            return null;
        }

        window.bytaDrilldownTid = function() {
            let newIndex = parseInt(document.getElementById("drilldown-tid-select").value);
            let newLabel = aktuellaDrilldownEtiketter[newIndex];
            visaDrilldown(newIndex, newLabel, aktuellDrilldownIndikator, false);
        };

        const deviationPlugin = {
            id: 'deviationText',
            afterDatasetsDraw: function(chart, args, options) {
                const ctx = chart.ctx;
                const data = chart.data;
                if (data.datasets.length < 2) return;
                
                if (data.labels.length > 15) return;
                
                let idxUtfall = -1;
                let idxPrognos = -1;
                for (let i = 0; i < data.datasets.length; i++) {
                    if (data.datasets[i].label && data.datasets[i].label.indexOf("Utfall") !== -1) idxUtfall = i;
                    if (data.datasets[i].label && data.datasets[i].label.indexOf("Prognos") !== -1) idxPrognos = i;
                }
                
                if (idxUtfall === -1 || idxPrognos === -1) return;

                const metaUtfall = chart.getDatasetMeta(idxUtfall);
                const metaPrognos = chart.getDatasetMeta(idxPrognos);
                
                if (!metaPrognos.hidden && metaPrognos.data.length > 0) {
                    ctx.save();
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.font = 'bold 13px Arial';
                    for (let i = 0; i < data.labels.length; i++) {
                        let valUtfall = data.datasets[idxUtfall].data[i];
                        let valPrognos = data.datasets[idxPrognos].data[i];
                        if (valUtfall !== null && valPrognos !== null && valPrognos !== undefined) {
                            let diff = valUtfall - valPrognos;
                            let text = (diff > 0 ? "+" : "") + diff.toLocaleString('sv-SE', {maximumFractionDigits: 0});
                            ctx.fillStyle = '#495057';
                            let bar = metaPrognos.data[i];
                            if (bar && bar.y) { ctx.fillText(text, bar.x, bar.y - 5); }
                        }
                    }
                    ctx.restore();
                }
            }
        };

        function visaDrilldown(index, tidpunktEtikett, valdIndikator, isReversed) {
            aktuellDrilldownIndikator = valdIndikator;
            
            let rad = sparadeRaderForDrilldown[index]; if (!rad && !isReversed) return;
            let ddConfig = getDrilldownConfig(valdIndikator); if (!ddConfig) return; 
            
            document.getElementById("main-view").style.display = "none";
            document.getElementById("topp-kontroller").style.display = "none";
            document.getElementById("botten-rad").style.display = "none";
            document.getElementById("drilldown-view").style.display = "flex";
            document.getElementById("drilldown-view").style.flexDirection = "column";
            
            let formatOptionsDD = (globalVisningsTyp === "procent_12m") ? {minimumFractionDigits: 1, maximumFractionDigits: 1} : {minimumFractionDigits: 0, maximumFractionDigits: 0};
            
            let ddTyp = "stapel"; 
            if (ddConfig.drilldown_typ && ddConfig.drilldown_typ !== "nan" && ddConfig.drilldown_typ !== "") ddTyp = String(ddConfig.drilldown_typ).toLowerCase().trim();
            if (globalGrafTyp === "stapel" && ddTyp === "linje") ddTyp = "stapel";

            let renRubrik = valdIndikator.replace(/_/g, ' ');
            if (drillChart != null) drillChart.destroy();
            const ctxD = document.getElementById('drilldownDiagram').getContext('2d');

            let limit = sparadeRaderForDrilldown.length;

            let labelsToUse = sparadeRaderForDrilldown.map(function(r) {
                let aKey = r["År"] !== undefined ? "År" : "Ã…r";
                let mKey = r["Månad"] !== undefined ? "Månad" : "MÃ¥nad";
                return globalGrafTyp === "linje" ? `${r[aKey]}-${String(r[mKey]).padStart(2, '0')}` : r[aKey];
            });

            if (isReversed) {
                // OMVÄND DRILLDOWN FÖR STAPLAR (När man klickat på en specifik åldersgrupp/komponent)
                document.getElementById("drilldown-tid-select").style.display = "none";
                let pSuffix = "";
                if (showMoM) pSuffix = " (Månadsförändring)";
                else if (globalVisningsTyp === "procent_12m") pSuffix = " (Årlig förändring %)";
                
                if (tidpunktEtikett) { aktuellDrilldownKomponentEtikett = tidpunktEtikett; } 
                else { tidpunktEtikett = aktuellDrilldownKomponentEtikett; }
                
                document.getElementById("drilldown-titel").innerText = `Historisk trend: ${tidpunktEtikett}${pSuffix}`;
                
                let komp = ""; let compIndex = 0;
                for(let i=0; i<ddConfig.drilldown_komponenter.length; i++) {
                    if(ddConfig.drilldown_komponenter[i].replace(/_/g, " ") === tidpunktEtikett || index === 0) { 
                        komp = ddConfig.drilldown_komponenter[i]; compIndex = i; break;
                    }
                }
                
                let kolNamn = komp + globalBerakning;
                let actualKolNamn = kolNamn;
                if (sparadeRaderForDrilldown[0]) {
                    if (sparadeRaderForDrilldown[0][kolNamn] !== undefined) { actualKolNamn = kolNamn; }
                    else if (sparadeRaderForDrilldown[0][komp] !== undefined) { actualKolNamn = komp; }
                }

                let progKolNamn = komp + "_Prognos_Slutgiltig";
                
                let fargNamn = (ddConfig.drilldown_farger && ddConfig.drilldown_farger[compIndex]) ? ddConfig.drilldown_farger[compIndex].toLowerCase().trim() : "blå";
                let fargHex = DRILLDOWN_FARGER[fargNamn] || DRILLDOWN_FARGER["blå"];
                
                let tLabels = sparadeRaderForDrilldown.map(function(r) { 
                    let aKey = r["År"] !== undefined ? "År" : "Ã…r"; 
                    let mKey = r["Månad"] !== undefined ? "Månad" : "MÃ¥nad";
                    const manader = ["Jan", "Feb", "Mar", "Apr", "Maj", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dec"];
                    let mNum = parseInt(r[mKey]);
                    if (!isNaN(mNum) && mNum >= 1 && mNum <= 12) { return manader[mNum - 1] + " " + r[aKey]; }
                    return r[aKey]; 
                });

                        }
                        
                        let fargNamn = (ddConfig.drilldown_farger && ddConfig.drilldown_farger[i]) ? ddConfig.drilldown_farger[i].toLowerCase().trim() : "blå";
                        
                        if (showMoM || globalVisningsTyp === "procent_12m") {
                            let val = ddData[ddData.length-1];
                            if (val === null || val === 0) {
                                ddColors.push(FARG_NEUTRAL_PUNKT);
                            } else {
                                let isGood = (rad[polaritetKolumn] && rad[polaritetKolumn].toString().trim().toLowerCase() === "låg") ? (val < 0) : (val > 0);
                                ddColors.push(isGood ? FARG_BRA : FARG_DALIG);
                            }
                        } else {
                            ddColors.push(DRILLDOWN_FARGER[fargNamn] || DRILLDOWN_FARGER["blå"]);
                        }
                    });

                    let datasets = [{ label: (globalVisningsTyp === "procent_12m" ? 'Utveckling (%)' : (showMoM ? 'Månadsförändring' : 'Utfall')), data: ddData, backgroundColor: ddColors, borderWidth: 1 }];
                    
                    let hasPrognos = ddPrognos.some(function(v) { return v !== null && v !== undefined && !isNaN(v); });
                    if (globalVisaPrognos && hasPrognos && globalVisningsTyp !== "procent_12m" && !showMoM && chartType === 'bar') {
                        datasets.push({ label: 'Prognos', data: ddPrognos, backgroundColor: '#e9ecef', borderColor: '#ced4da', borderWidth: 2 });
                    }
                    
                    let formatOptionsDD = (globalVisningsTyp === "procent_12m") ? {minimumFractionDigits: 1, maximumFractionDigits: 1} : {minimumFractionDigits: 0, maximumFractionDigits: 0};
                    let scalesConfig = { x: { grid: { display: false } }, y: { beginAtZero: (globalVisningsTyp !== "procent_12m" && !showMoM) } };
                    if (chartType === 'doughnut') scalesConfig = {};

                    document.getElementById("trend-ruta").style.display = "none";
                    let bottenInfoElementLocal = document.getElementById("botten-info");
                    if (bottenInfoElementLocal) bottenInfoElementLocal.innerHTML = "<em>💡 Klicka på en stapel/tårtbit för att se historisk utveckling.</em>";

                    if (myChart != null) myChart.destroy();
                    myChart = new Chart(document.getElementById('mittDiagram').getContext('2d'), {
                        type: chartType, data: { labels: ddLabels, datasets: datasets },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            interaction: { mode: 'index', intersect: false }, 
                            layout: { padding: { top: (globalVisaPrognos && hasPrognos && chartType === 'bar' && !showMoM) ? 25 : 0 } },
                            plugins: { 
                                legend: { display: chartType === 'doughnut', position: 'right' }, 
                                tooltip: { callbacks: { 
                                    title: function(context) { 
                                        let lbl = context[0].label;
                                        let mSelect = document.getElementById("global-manad");
                                        let manadText = mSelect && mSelect.options[mSelect.selectedIndex] ? mSelect.options[mSelect.selectedIndex].text : "";
                                        return lbl + " (" + manadText + " " + targetAr + ")";
                                    },
                                    label: function(c) { 
                                        let val = c.raw !== undefined ? c.raw : (c.parsed && c.parsed.y !== undefined ? c.parsed.y : null);
                                        if (val === null || val === undefined) return null;
                                        let prefix = c.dataset.label ? c.dataset.label + ": " : "";
                                        let plus = ((globalVisningsTyp === "procent_12m" || showMoM) && val > 0) ? "+" : "";
                                        return " " + prefix + plus + val.toLocaleString('sv-SE', formatOptionsDD) + (globalVisningsTyp==="procent_12m"?" %":""); 
                                    } 
                                } } 
                            },
                            scales: scalesConfig,
                            onHover: function(event, chartElement) { event.native.target.style.cursor = chartElement[0] ? 'pointer' : 'default'; },
                            onClick: function(event, activeEls) { if (activeEls.length > 0) { visaDrilldown(activeEls[0].index, ddLabels[activeEls[0].index], indikator, true); } }
                        },
                        plugins: (globalVisaPrognos && hasPrognos && chartType === 'bar' && !showMoM) ? [deviationPlugin] : []
                    });
                    return; 
                }
            }


            // --- NORMALT DIAGRAM ---
            let modVarden = [...allVarden]; let modCompare = [...allCompareVarden]; let modPrognos = [...allPrognosVarden];
            
            if (showMoM) {
                modVarden = beraknaMoMDiff(allVarden, allArLista, allManadLista, csvData, kolumnNamn);
                modCompare = beraknaMoMDiff(allCompareVarden, allArLista, allManadLista, csvData, compareKolumnNamn);
                modPrognos = allPrognosVarden.map(function() { return null; }); 
            } else if (globalVisningsTyp === "procent_12m") {
                modVarden = beraknaYoY(allVarden, allArLista, allManadLista, csvData, kolumnNamn);
                modCompare = beraknaYoY(allCompareVarden, allArLista, allManadLista, csvData, compareKolumnNamn);
                modPrognos = allPrognosVarden.map(function() { return null; }); 
            }

            document.getElementById("trend-ruta").style.display = "flex"; 
            
            let lastIndex = -1;
            let polaritet = "hög";
            for (let i = modVarden.length - 1; i >= 0; i--) {
                if (modVarden[i] !== null) { lastIndex = i; break; }
            }
            
            if (lastIndex !== -1) {
                let lastVal = modVarden[lastIndex], lastPrognos = modPrognos[lastIndex], aktuellRad = allRader[lastIndex];
                polaritet = aktuellRad[polaritetKolumn] ? aktuellRad[polaritetKolumn].toString().trim().toLowerCase() : "hög";
                let targetAr = (globalBerakning === "_R12" || globalGrafTyp === "stapel") ? allArLista[lastIndex] - 1 : (allManadLista[lastIndex] === 1 ? allArLista[lastIndex] - 1 : allArLista[lastIndex]);
                let targetManad = (globalBerakning === "_R12" || globalGrafTyp === "stapel") ? allManadLista[lastIndex] : (allManadLista[lastIndex] === 1 ? 12 : allManadLista[lastIndex] - 1);
                
                let prevVal = null; for(let i = lastIndex - 1; i >= 0; i--) { if (allArLista[i] === targetAr && allManadLista[i] === targetManad && modVarden[i] !== null) { prevVal = modVarden[i]; break; } }
                
                let tr = 0;
                if (globalVisningsTyp === "absolut" && !showMoM) tr = (globalBerakning === "_R12") ? beraknaTroskel(aktuellRad[troskelKolumn], (lastPrognos !== null ? lastPrognos : prevVal)) : 0; 
                
                let diffTrend = prevVal !== null ? lastVal - prevVal : 0;
                let trendPil = Math.abs(diffTrend) <= (globalBerakning !== "_R12" ? 0 : tr) ? "→" : (diffTrend > 0 ? "↑" : "↓");
                
                if (showMoM) {
                    let textKlass = "trend-neutral";
                    if (lastVal !== null && lastVal !== 0) {
                        let isGood = (polaritet === "låg") ? (lastVal < 0) : (lastVal > 0);
                        textKlass = isGood ? "trend-bra" : "trend-dalig";
                    }
                    let diffText = Math.abs(lastVal).toLocaleString('sv-SE', formatOptions);
                    let tPil = lastVal > 0 ? "↑" : (lastVal < 0 ? "↓" : "→");
                    document.getElementById("avvikelse-text").innerHTML = `<span class="${textKlass}"><span class="pil-boll" title="Förändring mot fg. månad">${tPil}</span> Månadsförändring: ${lastVal > 0 ? '+' : (lastVal < 0 ? '-' : '')}${diffText}</span>`;
                }
                else if (globalVisningsTyp === "procent_12m") {
                    let textKlass = "trend-neutral";
                    if (lastVal !== null && lastVal !== 0) {
                        let isGood = (polaritet === "låg") ? (lastVal < 0) : (lastVal > 0);
                        textKlass = isGood ? "trend-bra" : "trend-dalig";
                    }
                    let diffText = Math.abs(lastVal).toLocaleString('sv-SE', {minimumFractionDigits: 1, maximumFractionDigits: 1});
                    document.getElementById("avvikelse-text").innerHTML = `<span class="${textKlass}"><span class="pil-boll" title="Trend i utvecklingstakt mot fg. period">${trendPil}</span> Årlig förändring: ${lastVal > 0 ? '+' : (lastVal < 0 ? '-' : '')}${diffText} %</span>`;
                }
                else if (globalBerakning === "_R12" && lastPrognos !== null) {
                    let diffPrognos = lastVal - lastPrognos;
                    if (globalVisningsTyp === "index") {
                        let baseVarde = modVarden.find(function(v) { return v !== null && v !== 0; });
                        if (baseVarde) {
                            let indexVal = (lastVal / baseVarde) * 100;
                            let indexPrognos = (lastPrognos / baseVarde) * 100;
                            let indexDiff = indexVal - indexPrognos;
                            let indexTr = (tr / baseVarde) * 100;
                            let textKlass = "trend-neutral";
                            if (Math.abs(indexDiff) > indexTr) { textKlass = (polaritet === "låg" ? (indexDiff < 0) : (indexDiff > 0)) ? "trend-bra" : "trend-dalig"; }
                            let diffText = Math.abs(indexDiff).toLocaleString('sv-SE', {minimumFractionDigits: 1, maximumFractionDigits: 1});
                            document.getElementById("avvikelse-text").innerHTML = `<span class="${textKlass}"><span class="pil-boll">${trendPil}</span> ${diffText} enheter ${indexDiff >= 0 ? "över" : "under"} indexerat mål ${Math.abs(indexDiff) <= indexTr ? " (Inom mål)" : ""}</span>`;
                        }
                    } else {
                        let textKlass = "trend-neutral";
                        if (Math.abs(diffPrognos) > tr) textKlass = (polaritet === "låg" ? (diffPrognos < 0) : (diffPrognos > 0)) ? "trend-bra" : "trend-dalig";
                        let diffText = Math.abs(diffPrognos).toLocaleString('sv-SE', isProcent ? {minimumFractionDigits: 1, maximumFractionDigits: 1} : {maximumFractionDigits: 0});
                        document.getElementById("avvikelse-text").innerHTML = `<span class="${textKlass}"><span class="pil-boll">${trendPil}</span> Ligger ${diffText} ${diffPrognos >= 0 ? "över" : "under"} prognos ${Math.abs(diffPrognos) <= tr ? " (Inom mål)" : ""}</span>`;
                    }
                } else {
                    let visningsVarde = lastVal;
                    if (globalVisningsTyp === "index") {
                        let baseVarde = modVarden.find(function(v) { return v !== null && v !== 0; });
                        visningsVarde = baseVarde ? (lastVal / baseVarde) * 100 : lastVal;
                    }
                    document.getElementById("avvikelse-text").innerHTML = `<span class="trend-neutral"><span class="pil-boll">${trendPil}</span> ${visningsVarde.toLocaleString('sv-SE', anvandProcentFormat ? {minimumFractionDigits: 1, maximumFractionDigits: 1} : {})} ${(globalVisningsTyp === "index") ? " (Index)" : ""}</span>`;
                }
            } else document.getElementById("avvikelse-text").innerHTML = "<span class='trend-neutral'><span class='pil-boll'>?</span> Saknar data</span>";

            let etiketter = allEtiketter; 
            let pFargerBG = allFargerBG; 
            let pFargerBorder = allFargerBorder;

            let chartVarden = [...modVarden]; let chartPrognos = [...modPrognos]; let chartCompare = [...modCompare];

            if (showMoM && globalGrafTyp === 'stapel') {
                pFargerBG = chartVarden.map(function(v, i) {
                    if (v === null || v === 0) return FARG_NEUTRAL_PUNKT;
                    let p = allRader[i] && allRader[i][polaritetKolumn] ? allRader[i][polaritetKolumn].toString().trim().toLowerCase() : "hög";
                    let isGood = (p === "låg") ? (v < 0) : (v > 0);
                    return isGood ? FARG_BRA : FARG_DALIG;
                });
                pFargerBorder = pFargerBG;
            }

            if (globalVisningsTyp === "index" && !showMoM) {
                let baseVarde = chartVarden.find(function(v) { return v !== null && v !== 0; }); let baseCompare = chartCompare.find(function(v) { return v !== null && v !== 0; });
                if (baseVarde) { chartVarden = chartVarden.map(function(v) { return v !== null ? parseFloat(((v / baseVarde) * 100).toFixed(1)) : null; }); chartPrognos = chartPrognos.map(function(v) { return v !== null ? parseFloat(((v / baseVarde) * 100).toFixed(1)) : null; }); }
                if (baseCompare) { chartCompare = chartCompare.map(function(v) { return v !== null ? parseFloat(((v / baseCompare) * 100).toFixed(1)) : null; }); }
            }

            let bottenInfoElementLocal = document.getElementById("botten-info"); let compareDataFinns = chartCompare.some(function(v) { return v !== null; });
            let punktRadie = 4; if (globalTid === "5") punktRadie = 2; if (globalTid === "10" || globalTid === "alla" || (globalGrafTyp === 'linje' && etiketter.length > 80)) punktRadie = 1;

            if (myChart != null) myChart.destroy();
            let startaPaNoll = (globalGrafTyp === "stapel") && globalVisningsTyp === "absolut" && !showMoM;
            
            let scalesConfig = { 
                x: { grid: { display: false } }, 
                y: { 
                    type: 'linear', display: true, position: 'left', beginAtZero: startaPaNoll, 
                    ticks: { callback: function(value) { return value.toLocaleString('sv-SE', formatOptions); } },
                    grid: { color: function(c) { return (c.tick && c.tick.value === 0) ? '#adb5bd' : '#e9ecef'; }, lineWidth: function(c) { return (c.tick && c.tick.value === 0) ? 2 : 1; } }
                } 
            };

            let rTitleSuffix = "";
            if (showMoM) rTitleSuffix = " (Månadsförändring)";
            else if (globalVisningsTyp === "index") rTitleSuffix = " (Index)";
            else if (globalVisningsTyp === "procent_12m") rTitleSuffix = " (Årlig förändring %)";
            else rTitleSuffix = " (Utfall)";

            let ds = [{ 
                label: rubrikText + rTitleSuffix, data: chartVarden, backgroundColor: globalGrafTyp === 'linje' ? 'transparent' : pFargerBG, borderColor: globalGrafTyp === 'linje' ? FARG_LINJE : pFargerBorder, 
                pointBackgroundColor: pFargerBG, pointBorderColor: pFargerBorder, pointRadius: (globalGrafTyp === 'linje' ? punktRadie : 0), pointHoverRadius: punktRadie + 2, 
                pointHitRadius: 25, 
                borderWidth: 2, tension: 0.1, yAxisID: 'y' 
            }];
            
            if (globalGrafTyp === "linje" && globalVisaPrognos && selectedCompareRegion === "none" && globalVisningsTyp !== "procent_12m" && !showMoM) {
                if (bottenInfoElementLocal) bottenInfoElementLocal.innerHTML += (bottenInfoElementLocal.innerHTML === "" ? "" : "<br>") + `<em>* Den streckade grå linjen visar prognos/målvärde.</em>`;
                ds.push({ label: "Prognos", data: chartPrognos, backgroundColor: 'transparent', borderColor: '#6c757d', borderDash: [5, 5], pointRadius: 0, pointHitRadius: 25, borderWidth: 2, tension: 0.1, yAxisID: 'y' });
            }
            
            if (selectedCompareRegion !== "none" && compareDataFinns) {
                if (globalVisningsTyp === "index" && !showMoM) {
                    if (bottenInfoElementLocal) bottenInfoElementLocal.innerHTML = `<em>* Båda linjerna visas som Index (Startvärde = 100) och delar samma axel.</em>`;
                    ds.push({ label: compareLabel, data: chartCompare, backgroundColor: 'transparent', borderColor: FARG_RIKET, borderDash: [2, 2], pointRadius: 0, borderWidth: 2, tension: 0.1, yAxisID: 'y' });
                } else {
                    let maxVarde = Math.max(...chartVarden.filter(function(v) { return v !== null; }));
                    let maxCompare = Math.max(...chartCompare.filter(function(v) { return v !== null; }));
                    let minVarde = Math.min(...chartVarden.filter(function(v) { return v !== null; }));
                    let minCompare = Math.min(...chartCompare.filter(function(v) { return v !== null; }));
                    
                    let useDualAxis = false;

                    if (anvandProcentFormat) {
                         if (Math.abs(maxVarde - maxCompare) >= 3 || Math.abs(minVarde - minCompare) >= 3) {
                             useDualAxis = true;
                         }
                    } else {
                        if (maxVarde > 0 && maxCompare > 0) {
                            let ratio = Math.max(maxVarde, maxCompare) / Math.min(maxVarde, maxCompare);
                            if (ratio >= 3) {
                                useDualAxis = true;
                            }
                        }
                    }

                    if (useDualAxis) {
                         if (bottenInfoElementLocal) bottenInfoElementLocal.innerHTML = `<em>* Jämförelsevärden (${compareLabel}) visas på den högra axeln</em>`;
                         scalesConfig.y1 = { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, ticks: { color: FARG_RIKET, callback: function(value) { return value.toLocaleString('sv-SE', formatOptions); } }, beginAtZero: startaPaNoll, title: { display: true, text: compareLabel, color: FARG_RIKET, font: { size: 12, weight: 'bold' } } };
                         
                         let arForandringIndikator = indikator.toLowerCase().includes("förändring") || indikator.toLowerCase().includes("netto") || indikator.toLowerCase().includes("överskott");
                         let hasNegative = chartVarden.some(function(v) { return v !== null && v < 0; }) || (selectedCompareRegion === "none" && chartPrognos.some(function(v) { return v !== null && v < 0; })) || chartCompare.some(function(v) { return v !== null && v < 0; });

                         if ((arForandringIndikator || globalVisningsTyp === "procent_12m" || showMoM) && hasNegative) {
                             function snyggMax(val) { if (val === 0) return 10; let mag = Math.pow(10, Math.floor(Math.log10(val)) - 1); if (mag === 0) mag = 1; return Math.ceil((val * 1.1) / mag) * mag; }
                             let maxL = Math.max(0, ...chartVarden.filter(function(v) { return v !== null; }).map(Math.abs)); 
                             let maxR = Math.max(0, ...chartCompare.filter(function(v) { return v !== null; }).map(Math.abs));
                             let symMaxL = snyggMax(maxL); let symMaxR = snyggMax(maxR);
                             scalesConfig.y.min = -symMaxL; scalesConfig.y.max = symMaxL; scalesConfig.y1.min = -symMaxR; scalesConfig.y1.max = symMaxR;
                         }
                         ds.push({ label: compareLabel, data: chartCompare, backgroundColor: 'transparent', borderColor: FARG_RIKET, borderDash: [2, 2], pointRadius: 0, borderWidth: 2, tension: 0.1, yAxisID: 'y1' });
                    } else {
                         if (bottenInfoElementLocal) bottenInfoElementLocal.innerHTML = `<em>* Jämförelsevärden (${compareLabel}) visas på samma axel.</em>`;
                         ds.push({ label: compareLabel, data: chartCompare, backgroundColor: 'transparent', borderColor: FARG_RIKET, borderDash: [2, 2], pointRadius: 0, borderWidth: 2, tension: 0.1, yAxisID: 'y' });
                    }
                }
            } else { if (bottenInfoElementLocal) bottenInfoElementLocal.innerHTML = (globalVisningsTyp === "index" && !showMoM) ? "<em>* Visas som Index (Startvärde = 100).</em>" : ""; }

            myChart = new Chart(document.getElementById('mittDiagram').getContext('2d'), { 
                type: globalGrafTyp === 'linje' ? 'line' : 'bar', data: { labels: etiketter, datasets: ds }, 
                options: { 
                    responsive: true, maintainAspectRatio: false, spanGaps: false, 
                    interaction: { mode: 'index', intersect: false }, 
                    plugins: { 
                        legend: { position: 'bottom' },
                        tooltip: { callbacks: {
                                title: function(context) { 
                                    if (!context || !context[0]) return "";
                                    let lbl = context[0].label; 
                                    if (globalGrafTyp === 'stapel') {
                                        let mSelect = document.getElementById("global-manad");
                                        let manadText = mSelect && mSelect.options[mSelect.selectedIndex] ? mSelect.options[mSelect.selectedIndex].text : "";
                                        if (manadText) lbl += " (" + manadText + ")";
                                    }
                                    return lbl; 
                                },
                                label: function(context) {
                                    let val = context.raw !== undefined ? context.raw : (context.parsed && context.parsed.y !== undefined ? context.parsed.y : null);
                                    if (val === null || val === undefined) return null;
                                    let label = context.dataset.label || ''; if (label) { label += ': '; }
                                    let plusTecken = ((globalVisningsTyp === "procent_12m" || showMoM) && val > 0) ? '+' : '';
                                    label += plusTecken + val.toLocaleString('sv-SE', formatOptions); 
                                    if (globalVisningsTyp === "index" && !showMoM) { label += ' (Index)'; }
                                    else if (globalVisningsTyp === "procent_12m" && !showMoM) { label += ' %'; }
                                    return " " + label;
                                },
                                afterLabel: function(context) { 
                                    // SPÄRR INLAGD: Dölj klicka-texten om linje + showMoM är aktivt!
                                    if (harDrilldown && !(globalGrafTyp === 'linje' && showMoM)) {
                                        return "\n💡 Klicka för att se detaljer"; 
                                    }
                                    return null; 
                                }
                        } }
                    }, 
                    scales: scalesConfig,
                    onHover: function(event, chartElement) { 
                        // SPÄRR INLAGD: Byt inte muspekare om vi är i linje + Månadsförändring
                        if (harDrilldown && !(globalGrafTyp === 'linje' && showMoM)) { 
                            event.native.target.style.cursor = chartElement[0] ? 'pointer' : 'default'; 
                        } else { 
                            event.native.target.style.cursor = 'default'; 
                        } 
                    },
                    onClick: function(event, activeEls) { 
                        // SPÄRR INLAGD: Förhindra klick om vi är i linje + Månadsförändring
                        if (harDrilldown && !(globalGrafTyp === 'linje' && showMoM) && activeEls.length > 0) { 
                            visaDrilldown(activeEls[0].index, etiketter[activeEls[0].index], indikator); 
                        } 
                    }
                },
                plugins: (globalGrafTyp === "stapel" && globalVisaPrognos && selectedCompareRegion === "none" && !showMoM) ? [deviationPlugin] : [] 
            });
        }
    </script>
</body>
